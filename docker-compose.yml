services:
  api:
    build:
      dockerfile: ./Dockerfile
    image: libertai-api
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ip6net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:8-alpine
    container_name: libertai-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    networks:
      - ip6net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  ip6net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 2001:db8::/64
